id = "php-mago"
name = "PHP Mago"
version = "0.1.0"
schema_version = 1
authors = ["Lirim Sakura <sakura@lirim.net>"]
description = "Language Server for using Mago. Support lint and analyze. Mago is required in your $PATH."
