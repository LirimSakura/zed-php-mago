name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build assets for"
        required: true

jobs:
  build-lsp-server:
    name: Build LSP Server
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: mago-lsp-server-linux-amd64.tar.gz
            arch: x86_64
            use_cross: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: mago-lsp-server-linux-arm64.tar.gz
            arch: aarch64
            use_cross: true

          - os: macos-latest
            target: x86_64-apple-darwin
            name: mago-lsp-server-darwin-amd64.tar.gz
            arch: x86_64
            use_cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            name: mago-lsp-server-darwin-arm64.tar.gz
            arch: aarch64
            use_cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: mago-lsp-server-windows-amd64.zip
            arch: x86_64
            use_cross: false

          # - os: windows-latest
          #   target: aarch64-pc-windows-msvc
          #   name: mago-lsp-server-windows-arm64.exe
          #   arch: aarch64
          #   use_cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v6

      - name: Setup | Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup | Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tool
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cross Build
        if: matrix.use_cross
        run: cross build --manifest-path Cargo.toml --release --target ${{ matrix.target }}

      - name: Cargo Build
        if: ${{ !matrix.use_cross }}
        run: cargo build --manifest-path Cargo.toml --release --target ${{ matrix.target }}

      - name: Prepare artifacts [Windows]
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          strip mago-lsp-server.exe
          7z a ../../../${{ matrix.name }} mago-lsp-server.exe
          cd -

      - name: Prepare artifacts [Linux & macOS]
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          strip mago-lsp-server || true
          tar czvf ../../../${{ matrix.name }} mago-lsp-server
          cd -

      - name: Test Bin [Linux & macOS]
        if: matrix.arch == 'x86_64' && matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          ./mago-lsp-server --version
          cd -

      - name: Test Bin [Windows]
        if: matrix.arch == 'x86_64' && matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          ./mago-lsp-server.exe --version
          cd -

      - name: Deploy | Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  github-release:
    name: Create GitHub Release
    needs: build-lsp-server
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup | Artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-dist

      - name: Setup | Checksums
        run: |
          ls -lha release-dist
          for file in release-dist/**/*; do openssl dgst -sha256 -r "$file" | awk '{print $1}' > "${file}.sha256"; done

      - name: Publish
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: release-dist/**/*
